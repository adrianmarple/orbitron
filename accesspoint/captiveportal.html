<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumatron WiFi Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes animatedBackground {
      from { background-position: 0 0; }
      to { background-position: max(100vw, 100vh) max(100vw, 100vh); }
    }
    #background {
      position: fixed;
      left: 0; top: 0;
      z-index: -10;
      font-size: max(100vw, 100vh);
      width: 1em; height: 1em;
      background-image: repeating-linear-gradient(
        -45deg,
        #00f 0, #a0a 12.5%, #f00 25%, #a0a 37.5%,
        #00f 50%, #a0a 62.5%, #f00 75%, #a0a 87.5%, #00f 100%
      );
      animation: animatedBackground 20s linear infinite;
    }
    .horiz-box {
      background-color: #080808;
      width: 100%;
      display: flex;
      justify-content: center;
      min-height: 1rem;
    }
    .fancy-box {
      margin: 2px;
      width: calc(100% - 4px);
      background-color: #080808;
    }
    html, body {
      overscroll-behavior: none;
    }
    body {
      color: #e0e0e0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      display: flex;
      min-height: 100vh;
    }
    #main {
      width: 100%;
      max-width: calc(420px - 2rem);
      border-color: #080808;
      display: flex;
      flex-direction: column;
    }
    .side {
      width: calc(50vw - 210px + 1rem);
      background-color: #080808;
    }
    .bottom {
      flex: 1;
      background-color: #080808;
    }
    h1 { font-size: 2rem; color: #fff; }
    #orb-info { color: #888; font-size: 0.85rem; }
    .card {
      padding: 1.5rem;
    }
    .card h2 { font-size: 1rem; color: #aaa; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    #network-list { list-style: none; }
    #network-list li {
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
    }
    #network-list li:hover { background: #2a2a2a; }
    #network-list li.selected { background: #2a3a2a; }
    .signal { font-size: 0.75rem; color: #666; }
    #scan-status { color: #666; font-size: 0.85rem; font-style: italic; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.25rem; margin-top: 1rem; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: #555; }
    .show-pw {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #888;
      cursor: pointer;
      user-select: none;
    }
    .button {
      width: 100%;
      border-radius: 0.5rem;
      padding: 0.25rem 1rem;
      margin-top: 2.5rem;
      font-size: 1.2rem;
      text-align: center;
      cursor: pointer;
      background: white;
      color: #121212;
      position: relative;
      border: none;
    }
    .button:hover {
      box-shadow: 0 0.15rem 0.325rem 0.15rem rgba(255, 255, 255, 0.2);
      color: #555;
    }
    .button:active {
      box-shadow: 0 0 0.325rem 0.15rem rgba(255, 255, 255, 0.2);
      color: #666;
      transform: translateY(0.2rem);
    }
    .button.disabled {
      background-color: #ccc;
      color: #666;
      pointer-events: none;
    }
    #status {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      min-height: 1.2em;
      text-align: center;
    }
    .status-ok { color: #5a5; }
    .status-err { color: #a55; }
    .status-info { color: #88a; }
  </style>
</head>
<body>
  <div id="background"></div>

  <div class="side"></div>
  <div id="main">
    <div class="horiz-box"></div>
    <h1 class="horiz-box">Lumatron WiFi Setup</h1>
    <div id="orb-info" class="horiz-box">Loading...</div>
    <div class="horiz-box"></div>
    <div class="horiz-box"></div>

    <div class="card fancy-box">
      <h2>
        Networks
        <button class="btn-sm" id="refresh-btn" onclick="doScan()">Refresh</button>
      </h2>
      <ul id="network-list"><li id="scan-status">Scanning...</li></ul>
    </div>
    <div class="horiz-box"></div>

    <div class="card fancy-box">
      <label for="ssid">SSID</label>
      <input type="text" id="ssid" placeholder="Network name" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Leave blank if open"/>
      <label class="show-pw">
        <input type="checkbox" id="show-pw" onchange="togglePw()"/> Show password
      </label>
      <button class="button" id="connect-btn" onclick="doConnect()">Connect</button>
      <div id="status"></div>
    </div>
    <div class="horiz-box"></div>
    <div class="bottom"></div>
  </div>
  <div class="side"></div>

  <script>
    const ssidInput = document.getElementById('ssid')
    const pwInput = document.getElementById('password')
    const connectBtn = document.getElementById('connect-btn')
    const statusEl = document.getElementById('status')

    async function loadInfo() {
      try {
        const r = await fetch('/info')
        const d = await r.json()
        document.getElementById('orb-info').textContent =
          (d.orbID ? 'Orb: ' + d.orbID : '') +
          (d.version ? '  ·  Firmware v' + d.version : '')
      } catch(e) {
        document.getElementById('orb-info').textContent = ''
      }
    }

    async function doScan() {
      const list = document.getElementById('network-list')
      list.innerHTML = '<li id="scan-status">Scanning...</li>'
      document.getElementById('refresh-btn').disabled = true
      try {
        const r = await fetch('/scan')
        const nets = await r.json()
        renderNetworks(nets)
      } catch(e) {
        list.innerHTML = '<li id="scan-status">Scan failed</li>'
      }
      document.getElementById('refresh-btn').disabled = false
    }

    const NETWORKS_COLLAPSED = 4
    let allNetworks = []

    function renderNetworks(nets, expanded) {
      const list = document.getElementById('network-list')
      if (!nets || nets.length === 0) {
        list.innerHTML = '<li id="scan-status">No networks found</li>'
        return
      }
      allNetworks = nets
      list.innerHTML = ''
      const visible = expanded ? nets : nets.slice(0, NETWORKS_COLLAPSED)
      visible.forEach(n => {
        const li = document.createElement('li')
        const bars = signalBars(n.rssi)
        li.innerHTML = '<span>' + escHtml(n.ssid) + (n.open ? '' : ' 🔒') + '</span><span class="signal">' + bars + ' ' + n.rssi + ' dBm</span>'
        li.onclick = () => {
          document.querySelectorAll('#network-list li').forEach(x => x.classList.remove('selected'))
          li.classList.add('selected')
          ssidInput.value = n.ssid
          pwInput.focus()
        }
        list.appendChild(li)
      })
      if (!expanded && nets.length > NETWORKS_COLLAPSED) {
        const li = document.createElement('li')
        li.style.cssText = 'color:#888;font-size:0.85rem;justify-content:center;'
        li.textContent = 'Show ' + (nets.length - NETWORKS_COLLAPSED) + ' more…'
        li.onclick = () => renderNetworks(allNetworks, true)
        list.appendChild(li)
      }
    }

    function signalBars(rssi) {
      if (rssi >= -55) return '▂▄▆█'
      if (rssi >= -67) return '▂▄▆_'
      if (rssi >= -78) return '▂▄__'
      return '▂___'
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    function togglePw() {
      pwInput.type = document.getElementById('show-pw').checked ? 'text' : 'password'
    }

    async function doConnect() {
      const ssid = ssidInput.value.trim()
      if (!ssid) { setStatus('Enter an SSID', 'err'); return }
      connectBtn.disabled = true
      setStatus('Connecting…', 'info')
      try {
        const r = await fetch('/connect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'ssid=' + encodeURIComponent(ssid) + '&password=' + encodeURIComponent(pwInput.value)
        })
        const d = await r.json()
        if (d.success) {
          setStatus(d.ip ? 'Connected! IP: ' + d.ip + '. You can close this page.' : 'Connecting… reconnect to your normal network.', 'ok')
        } else {
          setStatus('Failed to connect. Check credentials.', 'err')
          connectBtn.disabled = false
        }
      } catch(e) {
        // AP dropping mid-response is expected on Pi — treat as connecting
        setStatus('Connecting… reconnect to your normal network.', 'ok')
      }
    }

    function setStatus(msg, type) {
      statusEl.textContent = msg
      statusEl.className = 'status-' + (type || 'info')
    }

    loadInfo()
    doScan()
  </script>
</body>
</html>
